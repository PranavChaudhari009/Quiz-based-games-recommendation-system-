<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <title>Game Recommendations</title>
</head>
<body>
    <body>
    <div class="result-container">
        <h2>Recommended Genre: {{ genre }}</h2>

        {% for game in games %}
            <div class="game-card">
                <h3>{{ game.name }}</h3>

                <a href="{{ game.trailer }}" target="_blank">
                    <img src="{{ url_for('static', filename='images/' + game.image) }}">
                </a>
            </div>
        {% endfor %}

        <br>
        <a href="/" class="try-again-btn">Try Again</a>
    </div>
</body>

</body>
</html>
